#create a file file.txt cnotaining the text "Hello, World!" and upload it as an artifact in a GitHub Actions workflow.```yaml
name: artifact workflows

on: 
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create a file
        run: touch hello.txt
      - name: write a file
        run: echo "Hello World" > hello.txt
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my_file
          path: hello.txt
  deploy_app:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: download artifact 
        uses: actions/download-artifact@v4
        with:
          name: my_file
      - name: read file
        run: cat hello.txt