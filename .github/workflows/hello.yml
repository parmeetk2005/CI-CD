name: My First Workflow

on: push
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"
      - name: Print Names
        run: echo "Hello , Parmeet Kaur"
  say-bye:
    runs-on: ubuntu-latest
    steps:
      - name: Print message
        run: echo "Goodbye, Github Actions!"
      - name: Print Names
        run: echo "Goodbye , Parmeet Kaur"